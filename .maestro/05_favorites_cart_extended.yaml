appId: isim.ia2y.myapplication
tags:
  - shopper
  - extended
  - favorites
---
- launchApp
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "android:id/aerr_wait"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "layoutSearchBar"
          timeout: 10000
- tapOn:
    id: "ivTopFavorites"
- extendedWaitUntil:
    visible:
      id: "btnFavoritesBrowseHome"
    timeout: 10000
- takeScreenshot: "40-favorites-empty"
- tapOn:
    id: "btnFavoritesBrowseHome"
- extendedWaitUntil:
    visible:
      id: "layoutSearchBar"
    timeout: 10000
- tapOn:
    id: "layoutSearchBar"
- extendedWaitUntil:
    visible:
      id: "etSearch"
    timeout: 10000
- tapOn:
    id: "etSearch"
- tapOn:
    text: "Cancel"
    optional: true
- inputText: "Balgha"
- pressKey: enter
- extendedWaitUntil:
    visible:
      id: "tvResultsCount"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "cardSearchProduct"
    timeout: 10000
- tapOn:
    id: "cardSearchProduct"
- extendedWaitUntil:
    visible:
      id: "btnFavoriteDetails"
    timeout: 10000
- tapOn:
    id: "btnFavoriteDetails"
- pressKey: back
- extendedWaitUntil:
    visible:
      id: "ivSearchBack"
    timeout: 10000
- tapOn:
    id: "ivSearchBack"
- extendedWaitUntil:
    visible:
      id: "ivTopFavorites"
    timeout: 10000
- tapOn:
    id: "ivTopFavorites"
- extendedWaitUntil:
    visible:
      id: "btnFavoriteAddCart"
    timeout: 10000
- takeScreenshot: "41-favorites-filled"
- tapOn:
    id: "btnFavoriteAddCart"
- extendedWaitUntil:
    visible:
      id: "tvBottomCartBadge"
    timeout: 5000
- tapOn:
    id: "navCart"
- extendedWaitUntil:
    visible:
      id: "btnCheckout"
    timeout: 10000
- assertVisible:
    id: "tvCartCountChip"
- takeScreenshot: "42-cart-from-favorites"
