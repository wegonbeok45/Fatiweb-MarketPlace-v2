appId: isim.ia2y.myapplication
tags:
  - admin
  - readonly
---
- launchApp:
    stopApp: true
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "android:id/aerr_wait"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "layoutSearchBar"
          timeout: 10000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 10000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 10000
- tapOn:
    id: "etEmail"
- inputText: "${QA_ADMIN_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_ADMIN_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 20000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardAdmin"
    timeout: 10000
- tapOn:
    id: "cardAdmin"
- extendedWaitUntil:
    visible:
      id: "adminNavDashboard"
    timeout: 15000
- assertVisible:
    id: "adminBtnAddProduct"
- takeScreenshot: "91-dashboard"
- tapOn:
    id: "adminNavCommandes"
- extendedWaitUntil:
    visible:
      id: "adminInlineCommandesTvTotal"
    timeout: 10000
- assertVisible:
    id: "adminInlineOrdersContainer"
- takeScreenshot: "92-orders"
- tapOn:
    id: "adminNavClients"
- extendedWaitUntil:
    visible:
      id: "adminInlineClientsTvTotal"
    timeout: 10000
- assertVisible:
    id: "adminInlineClientsListContainer"
- takeScreenshot: "92b-clients-inline"
- tapOn:
    id: "adminNavProduits"
- extendedWaitUntil:
    visible:
      id: "adminProduitsBtnAdd"
    timeout: 10000
- assertVisible:
    id: "adminProduitsList"
- takeScreenshot: "93-products"
- tapOn:
    id: "adminProduitsBtnAdd"
- extendedWaitUntil:
    visible:
      id: "adminProductEditorBtnSave"
    timeout: 10000
- takeScreenshot: "94-product-editor"
- tapOn:
    id: "adminProductEditorIvBack"
- extendedWaitUntil:
    visible:
      id: "adminProduitsBtnAdd"
    timeout: 10000
- tapOn:
    id: "adminNavNotifications"
- extendedWaitUntil:
    visible:
      id: "adminNotifBtnSend"
    timeout: 10000
- assertVisible:
    id: "adminNotifEtTitle"
- takeScreenshot: "96-notifications"
- tapOn:
    id: "adminNotifIvSettings"
- extendedWaitUntil:
    visible:
      id: "adminParamCardLivraison"
    timeout: 15000
- assertVisible:
    id: "adminParamLivrStandardPrice"
- takeScreenshot: "97-settings"
- tapOn:
    id: "adminParamLivrStandardEditGroup"
- extendedWaitUntil:
    visible:
      id: "etEditPrice"
    timeout: 10000
- assertVisible:
    id: "btnEditPriceCancel"
- takeScreenshot: "98-settings-dialog"
- tapOn:
    id: "btnEditPriceCancel"
- extendedWaitUntil:
    visible:
      id: "adminParamCardLivraison"
    timeout: 15000
