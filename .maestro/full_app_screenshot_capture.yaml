appId: isim.ia2y.myapplication
tags:
  - capture
  - all-screens
  - full-app
---
# ═══════════════════════════════════════════════════════════════
#  FatiWeb – Full App Screenshot Capture
#  Navigates every reachable screen and takes a screenshot.
#  Screenshots are saved under: ~/.maestro/tests/
#  Run:  maestro test .maestro/full_app_screenshot_capture.yaml
# ═══════════════════════════════════════════════════════════════

# ────────────────────────── 1. ONBOARDING ──────────────────────────
- launchApp:
    clearState: true

# Dismiss any crash dialogs
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "android:id/aerr_wait"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "btnNext"
          timeout: 15000

- takeScreenshot: "01_onboarding_screen_1"

- tapOn:
    id: "btnNext"
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      id: "btnContinue"
    timeout: 10000
- takeScreenshot: "02_onboarding_screen_2"

- tapOn:
    id: "btnContinue"
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      id: "btnGetStarted"
    timeout: 10000
- takeScreenshot: "03_onboarding_screen_3"

# ────────────────────────── 2. HOME (Guest) ──────────────────────────
- tapOn:
    id: "btnGetStarted"
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      id: "layoutSearchBar"
    timeout: 20000
- takeScreenshot: "04_home_guest"

# Scroll down to see more content
- swipe:
    start: 50%, 80%
    end: 50%, 30%
    duration: 500
- takeScreenshot: "05_home_guest_scrolled"
# Scroll back up
- swipe:
    start: 50%, 30%
    end: 50%, 80%
    duration: 500

