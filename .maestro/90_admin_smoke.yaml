appId: isim.ia2y.myapplication
tags:
  - admin
  - smoke
---
- launchApp:
    stopApp: true
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "android:id/aerr_wait"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "layoutSearchBar"
          timeout: 10000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 10000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 10000
- tapOn:
    id: "etEmail"
- inputText: "${QA_ADMIN_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_ADMIN_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 20000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardAdmin"
    timeout: 10000
- takeScreenshot: "90-profile-admin"
- tapOn:
    id: "cardAdmin"
- extendedWaitUntil:
    visible:
      id: "adminNavDashboard"
    timeout: 15000
- assertVisible:
    id: "adminNavCommandes"
- assertVisible:
    id: "adminNavClients"
- takeScreenshot: "91-admin-dashboard"
