appId: isim.ia2y.myapplication
tags:
  - admin
  - shopper
  - notifications
  - roundtrip
---
- launchApp:
    stopApp: true
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          id: "android:id/aerr_wait"
          optional: true
      - tapOn:
          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "layoutSearchBar"
          timeout: 10000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 15000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 15000
- tapOn:
    id: "etEmail"
- inputText: "${QA_ADMIN_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_ADMIN_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 30000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardAdmin"
    timeout: 15000
- tapOn:
    id: "cardAdmin"
- extendedWaitUntil:
    visible:
      id: "adminNavDashboard"
    timeout: 20000
- tapOn:
    id: "adminNavNotifications"
- extendedWaitUntil:
    visible:
      id: "adminNotifAudienceInput"
    timeout: 15000
- tapOn:
    id: "adminNotifAudienceInput"
- tapOn: "Clients"
- tapOn:
    id: "adminNotifEtTitle"
- inputText: "${QA_ADMIN_NOTIFICATION_TITLE}"
- hideKeyboard
- tapOn:
    id: "adminNotifEtMessage"
- inputText: "${QA_ADMIN_NOTIFICATION_MESSAGE}"
- hideKeyboard
- tapOn:
    id: "adminNotifBtnSend"
- extendedWaitUntil:
    visible: "${QA_ADMIN_NOTIFICATION_TITLE}"
    timeout: 30000
- takeScreenshot: "120-admin-notification-published"
- tapOn:
    id: "adminNotifIvBack"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 15000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 15000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 15000
- tapOn:
    id: "etEmail"
- inputText: "${QA_SHOPPER_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_SHOPPER_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 30000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "ivNotifications"
    timeout: 15000
- tapOn:
    id: "ivNotifications"
- extendedWaitUntil:
    visible:
      id: "rvNotifications"
    timeout: 15000
- extendedWaitUntil:
    visible: "${QA_ADMIN_NOTIFICATION_TITLE}"
    timeout: 30000
- takeScreenshot: "121-shopper-notification-visible"
- assertVisible:
    id: "tvClearAll"
- tapOn:
    id: "tvClearAll"
- extendedWaitUntil:
    visible: "${QA_ADMIN_NOTIFICATION_TITLE}"
    timeout: 15000
- takeScreenshot: "122-shopper-notification-read"
