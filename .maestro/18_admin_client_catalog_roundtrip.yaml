          text: "Wait"
          optional: true
      - extendedWaitUntil:
          visible:
            id: "layoutSearchBar"
          timeout: 10000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 15000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 15000
- tapOn:
    id: "etEmail"
- inputText: "${QA_ADMIN_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_ADMIN_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 30000
- tapOn:
    id: "hostNavProfile"
