appId: isim.ia2y.myapplication
tags:
  - admin
  - notifications
  - roundtrip
---
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible:
      id: "layoutSearchBar"
    timeout: 20000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardLogout"
    timeout: 15000
- tapOn:
    id: "cardLogout"
- extendedWaitUntil:
    visible:
      id: "btnLogin"
    timeout: 15000
- tapOn:
    id: "etEmail"
- inputText: "${QA_ADMIN_EMAIL}"
- hideKeyboard
- tapOn:
    id: "etPassword"
- inputText: "${QA_ADMIN_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "btnLogin"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 30000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "cardAdmin"
    timeout: 15000
- tapOn:
    id: "cardAdmin"
- extendedWaitUntil:
    visible:
      id: "adminNavNotifications"
    timeout: 20000
- tapOn:
    id: "adminNavNotifications"
- extendedWaitUntil:
    visible:
      id: "adminNotifEtTitle"
    timeout: 20000
- tapOn:
    id: "adminNotifEtTitle"
- inputText: "Codex Admin Broadcast"
