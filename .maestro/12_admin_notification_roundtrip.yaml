- hideKeyboard
- tapOn:
    id: "adminNotifBtnSend"
- extendedWaitUntil:
    visible: "Codex Admin Broadcast"
    timeout: 30000
- takeScreenshot: "12-admin-notification-history"
- tapOn:
    id: "adminNotifIvBack"
- extendedWaitUntil:
    visible:
      id: "hostNavProfile"
    timeout: 20000
- tapOn:
    id: "hostNavProfile"
- extendedWaitUntil:
    visible:
      id: "ivNotifications"
    timeout: 15000
- tapOn:
    id: "ivNotifications"
- extendedWaitUntil:
    visible: "Codex Admin Broadcast"
    timeout: 30000
- takeScreenshot: "12-shopper-notification-inbox"
