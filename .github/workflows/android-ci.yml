name: Android CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: firebase_functions_setup/package-lock.json

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Android unit tests
        run: ./gradlew testDebugUnitTest

      - name: Android lint
        run: ./gradlew lintDebug

      - name: Assemble release
        run: ./gradlew assembleRelease

      - name: Install Functions dependencies
        run: npm ci --prefix firebase_functions_setup

      - name: Build Firebase Functions
        run: npm --prefix firebase_functions_setup run build

      - name: Firebase Functions tests
        run: npm --prefix firebase_functions_setup test
